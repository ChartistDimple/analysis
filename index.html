<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow, noarchive" />
  <title>Track Record Preview — 김호문</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" />
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"
  />
  <style>
    :root {
      --primary: #093687;
    }
    body {
      font-family: "Pretendard", -apple-system, BlinkMacSystemFont, "Segoe UI",
        Roboto, sans-serif;
      letter-spacing: -0.01em;
    }
    .text-primary { color: var(--primary); }
    .bg-primary { background-color: var(--primary); }
    .border-primary { border-color: var(--primary); }
    .bg-primary-soft { background-color: #09368712; }
    .hover-primary:hover { color: var(--primary); }

    /* Hit badges */
    .hit-hit {
      background-color: #16A34A12;
      color: #15803D;
      border: 1px solid #16A34A30;
    }
    .hit-miss {
      background-color: #73737312;
      color: #525252;
      border: 1px solid #73737330;
    }
    .hit-progress {
      background-color: #D9770612;
      color: #B45309;
      border: 1px solid #D9770630;
    }

    /* Asset tag */
    .tag {
      background-color: #09368708;
      color: var(--primary);
      border: 1px solid #09368720;
    }

    /* Filter button active */
    .filter-active {
      background-color: var(--primary);
      color: white;
    }

    /* Row hover */
    .row-item {
      transition: background-color 0.15s;
    }
    .row-item:hover {
      background-color: #FAFAFA;
    }

    /* Hide scrollbar but allow scroll */
    .scroll-hide::-webkit-scrollbar { display: none; }
    .scroll-hide { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body class="bg-white text-gray-900">
  <!-- Hero -->
  <header class="pt-32 md:pt-44 pb-12 md:pb-16 bg-white border-b border-gray-100 text-center">
    <h1 class="text-5xl md:text-7xl font-bold text-gray-900 tracking-tighter mb-3">
      Chartist Dimple
    </h1>
    <p class="text-xs md:text-sm text-gray-400 tracking-[0.3em] uppercase mt-4">
      Market Analysis · Track Record
    </p>
  </header>

  <!-- ========== Track Record Section ========== -->
  <section id="track-record" class="pt-12 md:pt-16 pb-24 bg-white">
    <div class="max-w-6xl mx-auto px-6">
      <!-- Section header -->
      <div class="flex items-center gap-3 mb-8">
        <div class="h-px flex-1 bg-primary-soft"></div>
        <span class="text-xs md:text-sm font-semibold tracking-[0.3em] uppercase text-gray-400">
          Track Record
        </span>
        <div class="h-px flex-1 bg-primary-soft"></div>
      </div>

      <div class="text-center mb-10">
        <h3 class="text-2xl font-bold text-gray-900 mb-3">
          분석 공유 기록
        </h3>
        <p class="text-sm text-gray-500 max-w-xl mx-auto leading-relaxed">
          차트 분석 공유 기록에 대한 정리<br />
          분석 대상은 주식, 가상자산, 환율, 지수 등 대형주이고 중장기 뷰 위주
        </p>
      </div>

      <!-- Stats -->
      <div class="grid grid-cols-4 gap-3 mb-8 max-w-2xl mx-auto">
        <div class="text-center py-4 px-2 border border-gray-200 rounded-lg">
          <div class="text-2xl font-bold text-gray-900" id="stat-total">26</div>
          <div class="text-xs text-gray-500 mt-1">전체</div>
        </div>
        <div class="text-center py-4 px-2 border border-gray-200 rounded-lg">
          <div class="text-2xl font-bold text-primary" id="stat-crypto">—</div>
          <div class="text-xs text-gray-500 mt-1">가상자산</div>
        </div>
        <div class="text-center py-4 px-2 border border-gray-200 rounded-lg">
          <div class="text-2xl font-bold text-primary" id="stat-stock">—</div>
          <div class="text-xs text-gray-500 mt-1">주식</div>
        </div>
        <div class="text-center py-4 px-2 border border-gray-200 rounded-lg">
          <div class="text-2xl font-bold text-primary" id="stat-index">—</div>
          <div class="text-xs text-gray-500 mt-1">지수·환율</div>
        </div>
      </div>

      <!-- Filter buttons -->
      <div class="flex flex-wrap justify-center gap-2 mb-6">
        <button
          class="filter-btn filter-active px-4 py-2 rounded-full text-sm font-medium border border-gray-200"
          data-filter="all"
        >
          전체
        </button>
        <button
          class="filter-btn px-4 py-2 rounded-full text-sm font-medium border border-gray-200 bg-white text-gray-700 hover:bg-gray-50"
          data-filter="hit"
        >
          ✓ 적중
        </button>
        <button
          class="filter-btn px-4 py-2 rounded-full text-sm font-medium border border-gray-200 bg-white text-gray-700 hover:bg-gray-50"
          data-filter="miss"
        >
          ✗ 미적중
        </button>
        <button
          class="filter-btn px-4 py-2 rounded-full text-sm font-medium border border-gray-200 bg-white text-gray-700 hover:bg-gray-50"
          data-filter="progress"
        >
          ⋯ 진행중
        </button>
        <span class="w-2"></span>
        <button
          class="filter-btn px-4 py-2 rounded-full text-sm font-medium border border-gray-200 bg-white text-gray-700 hover:bg-gray-50"
          data-filter="youtube"
        >
          ▶ YouTube
        </button>
        <button
          class="filter-btn px-4 py-2 rounded-full text-sm font-medium border border-gray-200 bg-white text-gray-700 hover:bg-gray-50"
          data-filter="tradingview"
        >
          ◈ TradingView
        </button>
      </div>

      <!-- Track Record Header (desktop) -->
      <div
        class="hidden md:grid grid-cols-12 gap-3 px-4 py-2 text-xs font-semibold text-gray-400 uppercase tracking-wider border-b border-gray-200"
      >
        <div class="col-span-2">날짜</div>
        <div class="col-span-1">자산</div>
        <div class="col-span-4">제목</div>
        <div class="col-span-3">결과</div>
        <div class="col-span-1 text-center">판정</div>
        <div class="col-span-1 text-center">원본</div>
      </div>

      <!-- Track Record List -->
      <div id="track-list" class="divide-y divide-gray-100">
        <!-- rows are injected by JS -->
      </div>

      <!-- Footnote -->
      <p class="text-xs text-gray-400 text-center mt-10 leading-relaxed">
        차트 분석에 대한 근거는 비공개<br />
        데일리 매매를 위한 지지 / 저항 공유 기록은 생략<br />
        결과 한 줄은 해당 분석의 시간적 프레임을 고려하여 기록 예정
      </p>
    </div>
  </section>

  <script>
    // ====== DATA — 26건 (시계열 ASC: 가장 오래된 → 최신) ======
    const afterLink = (url, label) =>
      `<a href="${url}" target="_blank" rel="noopener noreferrer" class="text-primary hover:underline font-medium">→ After 차트 (${label})</a>`;

    const entries = [
      { date: '2023.12.30', tag: 'US',      title: '시스코 시스템즈',                                                            url: 'https://www.tradingview.com/chart/CSCO/nHHggAyG/',    platform: 'tradingview', dir: 'neutral', category: 'stock',  result: '', hit: 'hit' },
      { date: '2024.04.27', tag: 'KR',      title: '하이브 주봉 차트',                                                           url: 'https://www.tradingview.com/chart/352820/uRkL6Hgu/',  platform: 'tradingview', dir: 'neutral', category: 'stock',  result: '', hit: 'hit' },
      { date: '2024.08.04', tag: 'KR',      title: '네이버',                                                                    url: 'https://www.tradingview.com/chart/035420/MG4n5tOH/',  platform: 'tradingview', dir: 'neutral', category: 'stock',  result: '', hit: 'hit' },
      { date: '2024.08.11', tag: 'KR',      title: '삼성중공업',                                                                 url: 'https://www.tradingview.com/chart/010140/xuRtZ4uU/',  platform: 'tradingview', dir: 'neutral', category: 'stock',  result: '', hit: 'hit' },
      { date: '2024.08.11', tag: 'KR',      title: 'HD한국조선해양',                                                            url: 'https://www.tradingview.com/chart/009540/OkROkiJN/',  platform: 'tradingview', dir: 'neutral', category: 'stock',  result: '', hit: 'hit' },
      { date: '2024.08.19', tag: 'BTC',     title: '비트코인 업데이트',                                                          url: 'https://www.tradingview.com/chart/BTCUSD/GhU4xJT1/',  platform: 'tradingview', dir: 'neutral', category: 'crypto', result: '', hit: 'hit' },
      { date: '2024.09.07', tag: 'ETH',     title: '이더리움 업데이트',                                                          url: 'https://www.tradingview.com/chart/ETHUSDT/sx44sDyV/', platform: 'tradingview', dir: 'up',      category: 'crypto', result: '', hit: 'hit' },
      { date: '2024.09.21', tag: 'BTC/ETH', title: '비트코인 / 이더리움 업데이트',                                                url: 'https://www.tradingview.com/chart/BTCUSD/Khj3U5vf/',  platform: 'tradingview', dir: 'up',      category: 'crypto', result: '', hit: 'hit' },
      { date: '2024.10.26', tag: 'BTC.D',   title: '도미넌스 업데이트',                                                          url: 'https://www.tradingview.com/chart/BTC.D/LC2EreHn/',   platform: 'tradingview', dir: 'neutral', category: 'crypto', result: '', hit: 'progress' },
      { date: '2024.11.14', tag: 'KR',      title: '삼성전자 업데이트',                                                          url: 'https://www.tradingview.com/chart/005930/IxOvkujj/',  platform: 'tradingview', dir: 'neutral', category: 'stock',  result: '', hit: 'hit' },
      { date: '2024.11.20', tag: 'KR',      title: '한국항공우주 업데이트',                                                       url: 'https://www.tradingview.com/chart/047810/dsRYyQMq/',  platform: 'tradingview', dir: 'neutral', category: 'stock',  result: '', hit: 'hit' },
      { date: '2024.12.01', tag: 'KR',      title: '네이버 / 카카오 / 현대차 / 삼성바이오 / 삼성전자 중장기',                     url: 'https://youtu.be/Jvifu3zSnv8',                        platform: 'youtube',     dir: 'neutral', category: 'stock',  result: '', hit: 'hit' },
      { date: '2024.12.01', tag: 'US',      title: '나스닥 / 중장기관점',                                                        url: 'https://www.youtube.com/watch?v=veWO8wTi2bk',          platform: 'youtube',     dir: 'neutral', category: 'index',  result: '', hit: 'progress' },
      { date: '2024.12.08', tag: 'FX/KR',   title: '환율(중장기) / 코스피(초장기)',                                              url: 'https://youtu.be/CuRtEQmwo7s',                        platform: 'youtube',     dir: 'neutral', category: 'index',  result: '', hit: 'hit' },
      { date: '2024.12.08', tag: 'KR',      title: '코스피',                                                                     url: 'https://www.tradingview.com/chart/KOSPI/20fGnu2w/',   platform: 'tradingview', dir: 'neutral', category: 'index',  result: '', hit: 'hit' },
      { date: '2024.12.14', tag: 'Global',  title: '코스피 복기 및 단기 / 미국채 금리 / 나스닥 단기',                            url: 'https://youtu.be/7r7BOdy25D0',                        platform: 'youtube',     dir: 'neutral', category: 'index',  result: '', hit: 'hit' },
      { date: '2024.12.15', tag: 'BTC',     title: '전량매도 / 비트코인',                                                       url: 'https://youtu.be/1P_7nbdJjX0',                        platform: 'youtube',     dir: 'down',    category: 'crypto', result: '', hit: 'hit' },
      { date: '2024.12.15', tag: 'ALT',     title: '전량매도 / 알트코인',                                                       url: 'https://youtu.be/G2VkWskOP8w',                        platform: 'youtube',     dir: 'down',    category: 'crypto', result: '', hit: 'hit' },
      { date: '2024.12.18', tag: 'BTC/ALT', title: '비트알트 전량 매도 / 매수 버튼 삭제',                                         url: 'https://youtu.be/AK0QNubR6Qs',                        platform: 'youtube',     dir: 'down',    category: 'crypto', result: '', hit: 'hit' },
      { date: '2024.12.18', tag: 'BTC/ALT', title: '전량매도 / 비트코인 / 알트코인 / 매수버튼삭제',                                url: 'https://www.tradingview.com/chart/BTCUSDT/pdgfv1o5/', platform: 'tradingview', dir: 'down',    category: 'crypto', result: '', hit: 'hit' },
      { date: '2025.01.12', tag: 'US',      title: '미국주식 / 매수버튼얼음',                                                    url: 'https://youtu.be/LiWnpmlayRU',                        platform: 'youtube',     dir: 'down',    category: 'index',  result: '', hit: 'hit' },
      { date: '2025.01.27', tag: 'BTC',     title: '비트코인 / 하락 추세 전환 컨펌',                                            url: 'https://youtu.be/nkXZEf-GlUI',                        platform: 'youtube',     dir: 'down',    category: 'crypto', result: '', hit: 'hit' },
      { date: '2025.03.24', tag: 'US',      title: '미국주식 / 단기관점 / 탈출은 똑똑한 순서라며?',                              url: 'https://youtu.be/abTcppcH_m4',                        platform: 'youtube',     dir: 'down',    category: 'index',  result: '', hit: 'hit' },
      { date: '2025.04.28', tag: 'US',      title: '나스닥 / S&P500 / 미국주식 / 전량매도 / 매수버튼삭제',                       url: 'https://youtu.be/XsJf2OmRjgA',                        platform: 'youtube',     dir: 'down',    category: 'index',  result: '', hit: 'miss' },
      { date: '2025.05.26', tag: 'BTC',     title: '비트코인 / 매수 버튼 안녕',                                                  url: 'https://youtu.be/OHxFpxLNqC8',                        platform: 'youtube',     dir: 'down',    category: 'crypto', result: '', hit: 'hit' },
      { date: '2025.10.10', tag: 'BTC',     title: '비트코인 — 고통스러운 하락장이 진행될 것',                                    url: 'https://www.tradingview.com/x/Af5DZ7nA/',             platform: 'tradingview', dir: 'down',    category: 'crypto', result: afterLink('https://www.tradingview.com/x/RVMgnU72/', '2026.02.14'), hit: 'hit' },
    ];

    // ====== Render ======
    const list = document.getElementById('track-list');

    function hitBadge(hit) {
      if (hit === 'hit')      return `<span class="hit-hit inline-flex items-center justify-center px-2 py-0.5 rounded-full text-xs font-semibold">✓</span>`;
      if (hit === 'miss')     return `<span class="hit-miss inline-flex items-center justify-center px-2 py-0.5 rounded-full text-xs font-semibold">✗</span>`;
      if (hit === 'progress') return `<span class="hit-progress inline-flex items-center justify-center px-2 py-0.5 rounded-full text-xs font-semibold">⋯</span>`;
      return `<span class="hit-progress inline-flex items-center justify-center px-2 py-0.5 rounded-full text-xs">⋯</span>`;
    }

    function platformIcon(p) {
      if (p === 'youtube')     return `<span style="color:#CC0000">▶</span>`;
      if (p === 'tradingview') return `<span class="text-primary">◈</span>`;
      return '';
    }

    function renderRows(filter = 'all') {
      const filtered = entries.filter((e) => {
        if (filter === 'all') return true;
        if (['hit', 'miss', 'progress'].includes(filter)) return e.hit === filter;
        if (['youtube', 'tradingview'].includes(filter)) return e.platform === filter;
        return true;
      });

      list.innerHTML = filtered
        .map(
          (e) => `
        <div class="row-item grid grid-cols-1 md:grid-cols-12 gap-2 md:gap-3 px-4 py-4 items-start md:items-center">
          <div class="md:col-span-2 text-sm font-mono text-gray-700">${e.date}</div>
          <div class="md:col-span-1">
            <span class="tag inline-flex items-center px-2 py-0.5 rounded text-xs font-semibold whitespace-nowrap">${e.tag}</span>
          </div>
          <div class="md:col-span-4 text-sm text-gray-900 leading-snug">${e.title}</div>
          <div class="md:col-span-3 text-xs text-gray-500 leading-snug">
            ${e.result ? e.result : '<span class="text-gray-300 italic">결과 미입력</span>'}
          </div>
          <div class="md:col-span-1 md:text-center">${hitBadge(e.hit)}</div>
          <div class="md:col-span-1 md:text-center">
            <a href="${e.url}" target="_blank" rel="noopener noreferrer"
               class="inline-flex items-center justify-center w-8 h-8 rounded-full hover:bg-gray-100 text-base">
              ${platformIcon(e.platform)}
            </a>
          </div>
        </div>
      `
        )
        .join('');
    }

    function updateStats() {
      const crypto = entries.filter((e) => e.category === 'crypto').length;
      const stock  = entries.filter((e) => e.category === 'stock').length;
      const index  = entries.filter((e) => e.category === 'index').length;
      document.getElementById('stat-total').textContent = entries.length;
      document.getElementById('stat-crypto').textContent = crypto;
      document.getElementById('stat-stock').textContent = stock;
      document.getElementById('stat-index').textContent = index;
    }

    // Filter button events
    document.querySelectorAll('.filter-btn').forEach((btn) => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach((b) => {
          b.classList.remove('filter-active');
          b.classList.add('bg-white', 'text-gray-700');
        });
        btn.classList.add('filter-active');
        btn.classList.remove('bg-white', 'text-gray-700');
        renderRows(btn.dataset.filter);
      });
    });

    // Initial render
    updateStats();
    renderRows('all');
  </script>
</body>
</html>
